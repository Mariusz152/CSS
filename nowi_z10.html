<h1>Budowa selektora</h1>

<ol>
<li><b>Selektor</b> – wskazuje element (np. p)</li>
<li><b>Deklaracja</b> – zawiera cechy i wartości</li>
</ol>

<p><b>Nawiasy { }</b> zawierają styl.</p>
<p><b>Cecha</b> – np. color</p>
<p><b>Wartość</b> – np. red</p>
<p><b>Średnik</b> oddziela kolejne właściwości.</p>
